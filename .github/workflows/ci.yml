name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      production_model:
        description: Run the installed production-model transcription scenario
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Build control CLI from checkout
        run: |
          mkdir -p .tmp/ci
          go build -trimpath -o .tmp/ci/oc-control ./cmd/oc-control
      - name: Bootstrap development environment
        run: .tmp/ci/oc-control bootstrap --repo .
      - name: Check generated protocol artifacts
        run: .tmp/ci/oc-control protocol check --repo .
      - name: Check repository harness policy
        run: .tmp/ci/oc-control harness guard --repo .
      - name: Go format
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          test -z "$(gofmt -l "${go_files[@]}")"
      - name: Workspace format
        run: |
          pnpm format
          git diff --exit-code
      - run: go vet ./...

  go-tests:
    name: go tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Build control CLI from checkout
        run: |
          mkdir -p .tmp/ci
          go build -trimpath -o .tmp/ci/oc-control ./cmd/oc-control
      - name: Bootstrap development environment
        run: .tmp/ci/oc-control bootstrap --repo .
      # Media-dependent integration tests skip here by design: they need a built
      # closure, and building one belongs to the delivery lanes that already do.
      - run: go test -race ./...

  workspace:
    name: workspace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Build control CLI from checkout
        run: |
          mkdir -p .tmp/ci
          go build -trimpath -o .tmp/ci/oc-control ./cmd/oc-control
      - name: Bootstrap development environment
        run: .tmp/ci/oc-control bootstrap --repo .
      # The API package is excluded: its build produces the media closure, which
      # is delivery material, and nothing in the workspace build, lint, or test
      # graph consumes it. The filter has to name the root package too - its own
      # build script recurses over every workspace package, so leaving it in
      # would rebuild exactly what the filter is there to skip.
      - run: pnpm -r --filter '!@open-cut/api' --filter '!open-cut' run build
      - run: pnpm -r --filter '!@open-cut/api' --filter '!open-cut' run lint
      - run: pnpm -r --filter '!@open-cut/api' --filter '!open-cut' run test

  native-delivery:
    name: ${{ matrix.target }} delivery
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac-arm64
            runner: macos-15
            platform: mac
            arch: arm64
            control: ./oc-control
          - target: win-x64
            runner: windows-2025
            platform: win
            arch: x64
            control: ./oc-control.exe
          - target: linux-x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            control: ./oc-control
    runs-on: ${{ matrix.runner }}
    env:
      CONTROL: ${{ matrix.control }}
      PLATFORM: ${{ matrix.platform }}
      ARCH: ${{ matrix.arch }}
      TARGET: ${{ matrix.target }}
      VERSION: 0.1.0-ci.1
      BUNDLE: dist/open-cut-0.1.0-ci.1-${{ matrix.target }}.release-bundle.tar.zst
      TIMING_ROOT: .tmp/oc-control/timing/${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Build control CLI from checkout
        shell: bash
        run: go build -trimpath -o "${{ matrix.control }}" ./cmd/oc-control
      - name: Bootstrap development environment
        shell: bash
        run: ${{ matrix.control }} bootstrap --repo .
      - name: Compute media toolchain cache keys
        id: media_cache
        shell: bash
        env:
          CONTROL: ${{ matrix.control }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: bash .github/scripts/media-cache-keys.sh
      - name: Restore verified media toolchain closure
        if: github.event_name != 'release' && github.event_name != 'schedule'
        id: media_closure_restore
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          # The exact published closure is sufficient for the full hot pack
          # path. Restore it first so a normal product/UI edit does not download
          # source archives or a multi-gigabyte C build tree that pack will
          # never inspect.
          path: apps/api/dist/sidecar
          key: ${{ steps.media_cache.outputs.closure-key }}
          restore-keys: ${{ steps.media_cache.outputs.closure-prefix }}
      - name: Restore pinned media source archives
        if: >-
          github.event_name != 'release' &&
          github.event_name != 'schedule' &&
          steps.media_closure_restore.outputs.cache-hit != 'true'
        id: media_source_restore
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          # The whisper closure keeps its own source tree. Only the archive is
          # cached: a whisper cold build costs seconds, so there is nothing in
          # its compiled tree worth storing - unlike the codec toolchain, whose
          # tree exists precisely because rebuilding it costs minutes. Caching
          # the archive only spares the pinned download, whose failure modes are
          # upstream rather than local.
          path: |
            .tmp/oc-control/media-toolchain/*/source
            .tmp/oc-control/whisper-toolchain/*/source
          key: ${{ steps.media_cache.outputs.source-key }}
          restore-keys: ${{ steps.media_cache.outputs.source-prefix }}
      - name: Restore compiled media C tree
        if: >-
          github.event_name != 'release' &&
          github.event_name != 'schedule' &&
          steps.media_closure_restore.outputs.cache-hit != 'true'
        id: media_cbuild_restore
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          # The immutable cache key has a stable build-identity prefix and a
          # unique producer generation. Restore takes the newest generation;
          # only a tree that EnsureTree actually rebuilt is saved below. A bad
          # generation can therefore be replaced instead of poisoning one
          # permanent exact key, and an uninspected broad fallback can never be
          # promoted under a new identity.
          path: |
            .tmp/oc-control/media-toolchain/*/build
            !.tmp/oc-control/media-toolchain/*/build/renderer-helper
            !.tmp/oc-control/media-toolchain/*/build/renderer-relink-kit
          key: ${{ steps.media_cache.outputs.cbuild-key }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: ${{ steps.media_cache.outputs.cbuild-key }}-
      - name: Install Linux media build prerequisites
        if: matrix.platform == 'linux' && steps.media_closure_restore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm
      - name: Select Windows media build prerequisites
        if: matrix.platform == 'win'
        id: windows_media_prerequisites
        shell: bash
        env:
          MEDIA_CLOSURE_CACHE_HIT: ${{ steps.media_closure_restore.outputs.cache-hit }}
        run: |
          if [ "$MEDIA_CLOSURE_CACHE_HIT" = "true" ]; then
            echo "packages=" >> "$GITHUB_OUTPUT"
            echo "Windows media build prerequisites: skipped (exact closure cache key restored)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "packages=make mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc mingw-w64-x86_64-nasm mingw-w64-x86_64-pkgconf" >> "$GITHUB_OUTPUT"
            echo "Windows media build prerequisites: required (cold or fallback closure path)." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Configure Windows MSYS2 environment
        if: matrix.platform == 'win'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          # The runner image already owns the base MSYS2 installation. An exact
          # closure cache key only needs its shell; pack remains the byte-level
          # authority. Cold and fallback paths add the cached compiler package
          # set selected above.
          release: false
          cache: true
          install: ${{ steps.windows_media_prerequisites.outputs.packages }}
      - name: Check delivery toolchain
        shell: bash
        run: |
          "$CONTROL" doctor
      - name: Generate development release key
        shell: bash
        run: |
          "$CONTROL" release keygen --output .tmp/ci/key.json --id ci
      - name: Pack native bundle
        if: matrix.platform != 'win'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$TIMING_ROOT"
          "$CONTROL" pack "$PLATFORM" --arch "$ARCH" --version "$VERSION" --output "$BUNDLE" --timing-report "$TIMING_ROOT/pack.json"
      - name: Pack native bundle on Windows
        if: matrix.platform == 'win'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p "$TIMING_ROOT"
          "$CONTROL" pack "$PLATFORM" --arch "$ARCH" --version "$VERSION" --output "$BUNDLE" --timing-report "$TIMING_ROOT/pack.json"
      - name: Read C-tree build decision
        id: media_build
        shell: bash
        run: |
          c_build_tree="$("$CONTROL" timing decision --report "$TIMING_ROOT/media-toolchain.json" --name c-build-tree)"
          echo "c-build-tree=$c_build_tree" >> "$GITHUB_OUTPUT"
      - name: Publish release bundle
        shell: bash
        run: |
          "$CONTROL" release create --bundle "$BUNDLE" --origin .tmp/ci/origin --key .tmp/ci/key.json
      - name: Verify release bundle
        shell: bash
        run: |
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --bundle "$BUNDLE"
      - name: Verify published origin
        shell: bash
        run: |
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --origin .tmp/ci/origin --channel ci --key .tmp/ci/key.json
      - name: Exercise full-pack harness
        shell: bash
        run: |
          "$CONTROL" harness full-pack --bundle "$BUNDLE" --workspace .tmp/ci/full-pack
      - name: Record cache restore cohorts
        if: always() && github.event_name != 'release' && github.event_name != 'schedule'
        shell: bash
        continue-on-error: true
        run: |
          source_cache_hit="${{ steps.media_source_restore.outputs.cache-hit }}"
          c_build_cache_hit="${{ steps.media_cbuild_restore.outputs.cache-hit }}"
          if [ "${{ steps.media_closure_restore.outputs.cache-hit }}" = "true" ]; then
            source_cache_hit="not-needed"
            c_build_cache_hit="not-needed"
          fi
          "$CONTROL" timing cache-report \
            --output "$TIMING_ROOT/cache-restore.json" \
            --target "$TARGET" \
            --attribute "event=${{ github.event_name }}" \
            --attribute "runner-image=${{ runner.os }}/${{ runner.arch }}" \
            --attribute "commit=${{ github.sha }}" \
            --attribute "media-sources-restore-outcome=${{ steps.media_source_restore.outcome }}" \
            --attribute "media-c-build-restore-outcome=${{ steps.media_cbuild_restore.outcome }}" \
            --attribute "media-closure-restore-outcome=${{ steps.media_closure_restore.outcome }}" \
            --cache "media-sources,${{ steps.media_source_restore.outputs.cache-primary-key }},${{ steps.media_source_restore.outputs.cache-matched-key }},$source_cache_hit" \
            --cache "media-c-build,${{ steps.media_cbuild_restore.outputs.cache-primary-key }},${{ steps.media_cbuild_restore.outputs.cache-matched-key }},$c_build_cache_hit" \
            --cache "media-closure,${{ steps.media_closure_restore.outputs.cache-primary-key }},${{ steps.media_closure_restore.outputs.cache-matched-key }},${{ steps.media_closure_restore.outputs.cache-hit }}"
      - name: Save pinned media source archives
        if: ${{ success() && (github.event_name == 'push' || github.event_name == 'pull_request') && steps.media_closure_restore.outputs.cache-hit != 'true' && steps.media_source_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: |
            .tmp/oc-control/media-toolchain/*/source
            .tmp/oc-control/whisper-toolchain/*/source
          key: ${{ steps.media_cache.outputs.source-key }}
      - name: Save compiled media C tree
        if: ${{ success() && (github.event_name == 'push' || github.event_name == 'pull_request') && steps.media_build.outputs.c-build-tree == 'rebuilt' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          # Save the exact generation requested by the restore step, but only
          # after the program reports that it produced a current tree. Reused
          # trees already have a validated producer generation; not-inspected
          # trees must never be promoted.
          path: |
            .tmp/oc-control/media-toolchain/*/build
            !.tmp/oc-control/media-toolchain/*/build/renderer-helper
            !.tmp/oc-control/media-toolchain/*/build/renderer-relink-kit
          key: ${{ steps.media_cbuild_restore.outputs.cache-primary-key }}
      - name: Save verified media toolchain closure
        if: ${{ success() && (github.event_name == 'push' || github.event_name == 'pull_request') && steps.media_closure_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: apps/api/dist/sidecar
          key: ${{ steps.media_cache.outputs.closure-key }}
      # These exercise real media behaviour against real binaries, so they run
      # where a verified closure exists rather than forcing the fast lanes to
      # build one. One target is enough: they assert product behaviour, not
      # per-target delivery.
      - name: Exercise media-dependent API integration tests
        if: matrix.platform == 'linux'
        shell: bash
        working-directory: apps/api
        run: go test ./tests -count=1
      - name: Exercise macOS install, inspect, offline run, and idempotent uninstall
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/install-case
          receipt="$workspace/receipts/install-receipt.json"
          bootstrap="$workspace/user/bootstrap/bootstrap.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41000 >.tmp/ci/serve.json 2>.tmp/ci/serve.log &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41000 --key .tmp/ci/key.json --channel ci --headless
          "$CONTROL" inspect --receipt "$receipt"
          "$CONTROL" shutdown --bootstrap "$bootstrap"
          kill "$server_pid"
          wait "$server_pid" || true
          trap - EXIT
          "$CONTROL" harness run --workspace "$workspace" --receipt "$receipt" --headless
          "$CONTROL" inspect --receipt "$receipt"
          "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge
          "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge
      - name: Exercise installed Creator-to-CLI business slice
        if: matrix.platform == 'mac'
        shell: bash
        timeout-minutes: 10
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/business-fast
          receipt="$workspace/receipts/install-receipt.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41000 >.tmp/ci/business-fast-serve.json 2>.tmp/ci/business-fast-serve.log &
          server_pid=$!
          cleanup() {
            "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge || true
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null
          OPEN_CUT_HARNESS_CDP_PORT=41001 "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41000 --key .tmp/ci/key.json --channel ci --namespace business-fast
          cli_path="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).cliPath)' "$receipt")"
          PATH="$(dirname "$cli_path"):$PATH" \
            OPEN_CUT_ACCEPTANCE=1 \
            OPEN_CUT_ACCEPTANCE_CDP_ENDPOINT=http://127.0.0.1:41001 \
            go test ./internal/businessacceptance -run '^TestInstalledCreatorToCLI$' -count=1 -v
      - name: Restore pinned transcription model
        if: matrix.platform == 'mac' && (github.event_name == 'schedule' || github.event_name == 'release' || inputs.production_model)
        id: transcription_model_restore
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          # The downloader stages content-addressed as <entryDigest>.partial and
          # re-verifies a full-size partial against the pinned digest before
          # reusing it, so a restored file is checked exactly as a freshly
          # downloaded one is. A stale or truncated file therefore costs a
          # download, never a wrong transcript. The key is the pinned model
          # digest: it changes only when the model does.
          path: .tmp/ci/transcription-model
          key: transcription-model-v1-1be3a9b2063867b937e64e2ec7483364a79917e157fa98c5d94b5c1fffea987b
      - name: Exercise installed production-model transcription
        if: matrix.platform == 'mac' && (github.event_name == 'schedule' || github.event_name == 'release' || inputs.production_model)
        shell: bash
        timeout-minutes: 45
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/business-production-model
          receipt="$workspace/receipts/install-receipt.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41010 >.tmp/ci/business-production-model-serve.json 2>.tmp/ci/business-production-model-serve.log &
          server_pid=$!
          staging="$workspace/user/data/open-cut/ci/business-production-model/work/product-resource-downloads"
          cache=.tmp/ci/transcription-model
          # Uninstall --purge removes the data directory, so the staged model is
          # copied out before cleanup runs rather than after.
          cleanup() {
            if [ -d "$staging" ]; then
              mkdir -p "$cache"
              cp -f "$staging"/*.partial "$staging"/*.json "$cache"/ 2>/dev/null || true
            fi
            "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge || true
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41010/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          curl --fail --silent http://127.0.0.1:41010/metadata/ci/mac-arm64/latest.json >/dev/null
          OPEN_CUT_HARNESS_CDP_PORT=41011 "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41010 --key .tmp/ci/key.json --channel ci --namespace business-production-model
          # Seed the downloader's staging root with the cached model. It is
          # content-addressed and re-verified against the pinned digest before
          # reuse, so a stale or truncated file costs a download, never a wrong
          # transcript.
          if [ -d "$cache" ]; then
            mkdir -p "$staging"
            cp -f "$cache"/*.partial "$cache"/*.json "$staging"/ 2>/dev/null || true
          fi
          cli_path="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).cliPath)' "$receipt")"
          PATH="$(dirname "$cli_path"):$PATH" \
            OPEN_CUT_ACCEPTANCE=1 \
            OPEN_CUT_ACCEPTANCE_PRODUCTION_MODEL=1 \
            OPEN_CUT_ACCEPTANCE_CDP_ENDPOINT=http://127.0.0.1:41011 \
            go test ./internal/businessacceptance -run '^TestInstalledCreatorToCLI$' -count=1 -v -timeout 40m
      # The installed scenario above proves the Agent path. This proves the
      # Creator path, which reaches the transcript through Contracts rather than
      # the CLI and therefore exercises normalization the Agent surface never
      # touches. It runs on mac because that is where the accelerated backend
      # exists; it skips rather than fails when the pinned model is absent.
      - name: Exercise the Creator transcription pipeline against the pinned model
        if: matrix.platform == 'mac' && (github.event_name == 'schedule' || github.event_name == 'release' || inputs.production_model)
        shell: bash
        working-directory: apps/api
        timeout-minutes: 20
        run: |
          set -euo pipefail
          model="$(find ../../.tmp/ci/transcription-model -maxdepth 1 -type f -name '*.partial' -print -quit 2>/dev/null || true)"
          if [ -z "$model" ]; then
            echo "pinned transcription model unavailable; the Creator transcription test will skip"
          else
            model="$(cd "$(dirname "$model")" && pwd)/$(basename "$model")"
          fi
          OPEN_CUT_TRANSCRIPTION_MODEL="${model:-}" \
            go test ./tests -run '^TestRealTranscriptCommandProducesTranscriptFromBothClosures$' -count=1 -v
      - name: Save pinned transcription model
        if: ${{ always() && matrix.platform == 'mac' && steps.transcription_model_restore.outcome == 'success' && steps.transcription_model_restore.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .tmp/ci/transcription-model
          key: transcription-model-v1-1be3a9b2063867b937e64e2ec7483364a79917e157fa98c5d94b5c1fffea987b
      - name: Summarize delivery timings
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          reports=()
          for report in \
            "$TIMING_ROOT/cache-restore.json" \
            "$TIMING_ROOT/media-toolchain.json" \
            "$TIMING_ROOT/whisper-toolchain.json" \
            "$TIMING_ROOT"/artifact-check-*.json \
            "$TIMING_ROOT/pack.json" \
            .tmp/ci/full-pack/reports/timing.json
          do
            if [ -f "$report" ]; then
              reports+=(--report "$report")
            fi
          done
          if [ "${#reports[@]}" -eq 0 ]; then
            echo "No delivery timing reports were produced for $TARGET." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Delivery timings · $TARGET"
            echo
            "$CONTROL" timing summary "${reports[@]}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload delivery timing reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: open-cut-timing-${{ matrix.target }}
          path: |
            .tmp/ci/full-pack/reports/report.json
            .tmp/ci/full-pack/reports/timing.json
            .tmp/ci/full-pack/reports/logs/full-pack.log
            .tmp/oc-control/timing/${{ matrix.target }}/*.json
          if-no-files-found: warn
      - name: Upload delivery bundle
        uses: actions/upload-artifact@v7
        if: always() && github.event_name != 'pull_request'
        with:
          name: open-cut-${{ matrix.target }}
          path: |
            dist/open-cut-0.1.0-ci.1-${{ matrix.target }}.release-bundle.tar.zst
            .tmp/ci/origin/releases/0.1.0-ci.1/${{ matrix.target }}/release.json
            .tmp/ci/origin/metadata/ci/${{ matrix.target }}/latest.json
          if-no-files-found: warn
