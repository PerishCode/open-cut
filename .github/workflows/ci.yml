name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      production_model:
        description: Run the installed production-model transcription scenario
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install Linux media build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm
      - name: Build control CLI from checkout
        run: |
          mkdir -p .tmp/ci
          go build -trimpath -o .tmp/ci/oc-control ./cmd/oc-control
      - name: Bootstrap development environment
        run: .tmp/ci/oc-control bootstrap --repo .
      - name: Check generated protocol artifacts
        run: .tmp/ci/oc-control protocol check --repo .
      - name: Check repository harness policy
        run: .tmp/ci/oc-control harness guard --repo .
      - name: Go format
        shell: bash
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          test -z "$(gofmt -l "${go_files[@]}")"
      - name: Workspace format
        run: |
          pnpm format
          git diff --exit-code
      - run: go vet ./...
      - run: go test -race ./...
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm test

  native-delivery:
    name: ${{ matrix.target }} delivery
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac-arm64
            runner: macos-15
            platform: mac
            arch: arm64
            control: ./oc-control
          - target: win-x64
            runner: windows-2025
            platform: win
            arch: x64
            control: ./oc-control.exe
          - target: linux-x64
            runner: ubuntu-24.04
            platform: linux
            arch: x64
            control: ./oc-control
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Install Linux media build prerequisites
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm
      - name: Configure Windows media build toolchain
        if: matrix.platform == 'win'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkgconf
      - name: Build control CLI from checkout
        shell: bash
        run: go build -trimpath -o "${{ matrix.control }}" ./cmd/oc-control
      - name: Bootstrap development environment
        shell: bash
        run: ${{ matrix.control }} bootstrap --repo .
      - name: Pack, publish, and verify native full pack
        if: matrix.platform != 'win'
        shell: bash
        env:
          CONTROL: ${{ matrix.control }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
          VERSION: 0.1.0-ci.1
        run: |
          set -euo pipefail
          bundle="dist/open-cut-${VERSION}-${TARGET}.release-bundle.tar.zst"
          "$CONTROL" doctor
          "$CONTROL" release keygen --output .tmp/ci/key.json --id ci
          "$CONTROL" pack "$PLATFORM" --arch "$ARCH" --version "$VERSION" --output "$bundle"
          "$CONTROL" release create --bundle "$bundle" --origin .tmp/ci/origin --key .tmp/ci/key.json
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --bundle "$bundle"
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --origin .tmp/ci/origin --channel ci --key .tmp/ci/key.json
          "$CONTROL" harness full-pack --bundle "$bundle" --workspace .tmp/ci/full-pack
      - name: Pack, publish, and verify native full pack on Windows
        if: matrix.platform == 'win'
        shell: msys2 {0}
        env:
          CONTROL: ${{ matrix.control }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          TARGET: ${{ matrix.target }}
          VERSION: 0.1.0-ci.1
        run: |
          set -euo pipefail
          bundle="dist/open-cut-${VERSION}-${TARGET}.release-bundle.tar.zst"
          "$CONTROL" doctor
          "$CONTROL" release keygen --output .tmp/ci/key.json --id ci
          "$CONTROL" pack "$PLATFORM" --arch "$ARCH" --version "$VERSION" --output "$bundle"
          "$CONTROL" release create --bundle "$bundle" --origin .tmp/ci/origin --key .tmp/ci/key.json
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --bundle "$bundle"
          "$CONTROL" verify "$PLATFORM" --arch "$ARCH" --origin .tmp/ci/origin --channel ci --key .tmp/ci/key.json
          "$CONTROL" harness full-pack --bundle "$bundle" --workspace .tmp/ci/full-pack
      - name: Exercise macOS install, inspect, offline run, and idempotent uninstall
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/install-case
          receipt="$workspace/receipts/install-receipt.json"
          bootstrap="$workspace/user/bootstrap/bootstrap.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41000 >.tmp/ci/serve.json 2>.tmp/ci/serve.log &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41000 --key .tmp/ci/key.json --channel ci --headless
          "$CONTROL" inspect --receipt "$receipt"
          "$CONTROL" shutdown --bootstrap "$bootstrap"
          kill "$server_pid"
          wait "$server_pid" || true
          trap - EXIT
          "$CONTROL" harness run --workspace "$workspace" --receipt "$receipt" --headless
          "$CONTROL" inspect --receipt "$receipt"
          "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge
          "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge
      - name: Exercise installed Creator-to-CLI business slice
        if: matrix.platform == 'mac'
        shell: bash
        timeout-minutes: 10
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/business-fast
          receipt="$workspace/receipts/install-receipt.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41000 >.tmp/ci/business-fast-serve.json 2>.tmp/ci/business-fast-serve.log &
          server_pid=$!
          cleanup() {
            "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge || true
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          curl --fail --silent http://127.0.0.1:41000/metadata/ci/mac-arm64/latest.json >/dev/null
          OPEN_CUT_HARNESS_CDP_PORT=41001 "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41000 --key .tmp/ci/key.json --channel ci --namespace business-fast
          cli_path="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).cliPath)' "$receipt")"
          PATH="$(dirname "$cli_path"):$PATH" \
            OPEN_CUT_ACCEPTANCE=1 \
            OPEN_CUT_ACCEPTANCE_CDP_ENDPOINT=http://127.0.0.1:41001 \
            go test ./internal/businessacceptance -run '^TestInstalledCreatorToCLI$' -count=1 -v
      - name: Exercise installed production-model transcription
        if: matrix.platform == 'mac' && (github.event_name == 'schedule' || github.event_name == 'release' || inputs.production_model)
        shell: bash
        timeout-minutes: 45
        env:
          CONTROL: ${{ matrix.control }}
        run: |
          set -euo pipefail
          workspace=.tmp/ci/business-production-model
          receipt="$workspace/receipts/install-receipt.json"
          "$CONTROL" serve --root .tmp/ci/origin --listen 127.0.0.1:41010 >.tmp/ci/business-production-model-serve.json 2>.tmp/ci/business-production-model-serve.log &
          server_pid=$!
          cleanup() {
            "$CONTROL" harness uninstall --workspace "$workspace" --receipt "$receipt" --purge || true
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for _ in {1..50}; do
            curl --fail --silent http://127.0.0.1:41010/metadata/ci/mac-arm64/latest.json >/dev/null && break
            sleep 0.1
          done
          curl --fail --silent http://127.0.0.1:41010/metadata/ci/mac-arm64/latest.json >/dev/null
          OPEN_CUT_HARNESS_CDP_PORT=41011 "$CONTROL" harness install mac --arch arm64 --workspace "$workspace" --origin .tmp/ci/origin --origin-url http://127.0.0.1:41010 --key .tmp/ci/key.json --channel ci --namespace business-production-model
          cli_path="$(node -e 'const fs = require("node:fs"); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).cliPath)' "$receipt")"
          PATH="$(dirname "$cli_path"):$PATH" \
            OPEN_CUT_ACCEPTANCE=1 \
            OPEN_CUT_ACCEPTANCE_PRODUCTION_MODEL=1 \
            OPEN_CUT_ACCEPTANCE_CDP_ENDPOINT=http://127.0.0.1:41011 \
            go test ./internal/businessacceptance -run '^TestInstalledCreatorToCLI$' -count=1 -v
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: open-cut-${{ matrix.target }}
          path: |
            dist/open-cut-0.1.0-ci.1-${{ matrix.target }}.release-bundle.tar.zst
            .tmp/ci/origin/releases/0.1.0-ci.1/${{ matrix.target }}/release.json
            .tmp/ci/origin/metadata/ci/${{ matrix.target }}/latest.json
            .tmp/ci/full-pack/reports/logs/full-pack.log
          if-no-files-found: warn
